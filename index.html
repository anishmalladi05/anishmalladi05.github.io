<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #111;
            color: white;
            margin: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            position: sticky;
            top: 0;
            background: #111;
            border-bottom: 1px solid #222;
            z-index: 20;
            flex-wrap: wrap;
            gap: 10px;
        }

        .site-name {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            margin: 0;
        }

        nav button {
            background: none;
            border: none;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 14px;
            font-family: sans-serif;
        }

        nav button.active {
            color: white;
            border-bottom: 2px solid white;
        }

        nav button:hover {
            color: white;
        }

        .section {
            display: none;
            padding: 24px 30px 60px;
        }

        .section.active {
            display: block;
        }

        /* ---------- Photography gallery ---------- */

        .gallery {
            columns: 280px;
            column-gap: 14px;
        }

        .gallery img {
            width: 100%;
            display: block;
            margin-bottom: 14px;
            border-radius: 10px;
            break-inside: avoid;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .gallery img:hover {
            opacity: 0.85;
        }

        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: 100;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 6px;
        }

        /* ---------- 3D Printing section ---------- */

        .printing-top {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .btn {
            background-color: white;
            color: #111;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            font-family: sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #ddd;
        }

        .btn-outline {
            background: none;
            color: white;
            border: 1px solid #444;
        }

        .btn-outline:hover {
            background: #1c1c1c;
        }

        #stlInput {
            display: none;
        }

        #model-name {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
            min-height: 18px;
        }

        #viewer-container {
            width: 100%;
            height: 60vh;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #262626;
            overflow: hidden;
            position: relative;
        }

        #viewer-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 15px;
            pointer-events: none;
            text-align: center;
            padding: 20px;
        }

        .stl-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 16px;
        }

        .stl-item button {
            background: #1c1c1c;
            color: white;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 14px;
        }

        .stl-item button:hover {
            background: #262626;
        }

        .stl-item .makerworld-sub {
            display: block;
            margin: 8px 0 0 18px;
            color: #999;
            font-size: 13px;
            text-decoration: none;
        }

        .stl-item .makerworld-sub:hover {
            color: white;
        }

        .empty-note {
            color: #666;
            font-size: 14px;
            margin-top: 16px;
        }

        @media (max-width: 600px) {
            header {
                padding: 14px 18px;
            }

            .section {
                padding: 18px 18px 50px;
            }

            #viewer-container {
                height: 48vh;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="site-name" onclick="location.reload()">anish malladi</h1>
        <nav>
            <button id="nav-photography" class="active" onclick="showSection('photography')">Photography</button>
            <button id="nav-printing" onclick="showSection('printing')">3D Printing</button>
        </nav>
    </header>

    <div id="section-photography" class="section active">
        <div class="gallery" id="gallery"></div>
    </div>

    <div id="section-printing" class="section">
        <div class="printing-top">
            <button class="btn" onclick="document.getElementById('stlInput').click()">Upload STL</button>
            <input type="file" id="stlInput" accept=".stl" />
            <button class="btn btn-outline" id="clear-btn" onclick="clearViewer()" style="display:none;">Clear</button>
        </div>

        <div id="model-name"></div>

        <div id="viewer-container">
            <div id="viewer-hint">Upload an STL file or pick one below to view it here — drag to rotate, scroll to zoom.</div>
        </div>

        <div class="stl-list" id="stl-list"></div>
        <div class="empty-note" id="stl-empty-note" style="display:none;">Add your prints to the STL/ folder and list them in the script to show them here.</div>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>

    <script>
    /* =========================================================
       CONFIG — edit these to add your own content
       ========================================================= */

    const PHOTOS = [
        "PHOTOS/AnnetteLake.jpeg",
        "PHOTOS/BeachRoad2025.jpeg",
        "PHOTOS/BoatonBeach.jpeg",
        "PHOTOS/BuildinginSky.jpeg",
        "PHOTOS/BuildingwithBridge.jpeg",
        "PHOTOS/BuildingwithWindows.jpeg",
        "PHOTOS/ConcreteWalkway.jpeg",
        "PHOTOS/DiwaliUmbrellas.jpeg",
        "PHOTOS/DoginWater.jpeg",
        "PHOTOS/GreenandYellowLeaf.jpeg",
        "PHOTOS/GreenLeaveswithWaterDroplets.jpeg",
        "PHOTOS/GroupofTrees.jpeg",
        "PHOTOS/JasperNationalPark.jpeg",
        "PHOTOS/LakeinJasper.jpeg",
        "PHOTOS/OceanShore.jpeg",
        "PHOTOS/PalmLeafwithWaterDroplets.jpeg",
        "PHOTOS/PersononBridge.jpeg",
        "PHOTOS/RedCanoeonLake.jpeg",
        "PHOTOS/SmallBoatonWater.jpeg",
        "PHOTOS/SnowyMountain.jpeg",
        "PHOTOS/StairsBetweenWalls.jpeg",
        "PHOTOS/TreewithGreenLeaves.jpeg",
        "PHOTOS/WaterFalling.jpeg",
        "PHOTOS/CanyonTopView.jpeg",
        "PHOTOS/Apps.JPG",
        "PHOTOS/Camera.JPG",
        "PHOTOS/CameraLens.heic",
        "PHOTOS/Dock.JPG",
        "PHOTOS/Filament.JPG",
        "PHOTOS/Hose.JPG",
        "PHOTOS/Keyboard.JPG",
        "PHOTOS/Leafs.JPG",
        "PHOTOS/PineCil.JPG",
        "PHOTOS/SkadisHand.JPG",
        "PHOTOS/StandBy.JPG",
    ];

    // Add prints here as you save .stl files into a PRINTS/ folder.
    // "makerworld" is optional — leave it out (or set to "") to skip the link for that print.
    const STL_FILES = [
        { name: "Marble Run", file: "PRINTS/MarbleRun.stl", makerworld: "https://makerworld.com/en/models/2515372-fully-3d-printed-marble-run#profileId-2766665" },
        { name: "Zipper", file: "PRINTS/Zipper.stl", makerworld: "https://makerworld.com/en/models/2577671-fully-3d-printed-zipper#profileId-2842603" },
        { name: "Working Ski Diorama", file: "PRINTS/WorkingSkiDiorama.stl", makerworld: "https://makerworld.com/en/models/2439669-working-ski-diorama#profileId-2677126" },
    ];

    /* =========================================================
       Nav
       ========================================================= */

    function showSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        document.getElementById('nav-' + name).classList.add('active');
        if (name === 'printing') {
            requestAnimationFrame(resizeViewer);
        }
    }

    /* =========================================================
       Photography gallery + lightbox
       ========================================================= */

    function buildGallery() {
        const gallery = document.getElementById('gallery');
        PHOTOS.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.onclick = () => openLightbox(src);
            gallery.appendChild(img);
        });
    }

    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
    }

    /* =========================================================
       3D Printing — STL viewer
       ========================================================= */

    let scene, camera, renderer, controls, currentMesh;

    function initViewer() {
        const container = document.getElementById('viewer-container');

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
        light1.position.set(1, 1, 1);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0xffffff, 0.4);
        light2.position.set(-1, -0.5, -1);
        scene.add(light2);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;

        window.addEventListener('resize', resizeViewer);
        resizeViewer();
        animate();
    }

    function resizeViewer() {
        const container = document.getElementById('viewer-container');
        const width = container.clientWidth;
        const height = container.clientHeight;
        if (!width || !height) return;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    function showModel(geometry, label) {
        if (currentMesh) {
            scene.remove(currentMesh);
            currentMesh.geometry.dispose();
            currentMesh.material.dispose();
        }

        // STL exports are typically Z-up; three.js is Y-up.
        geometry.rotateX(-Math.PI / 2);
        geometry.computeBoundingBox();
        const center = new THREE.Vector3();
        geometry.boundingBox.getCenter(center);
        geometry.translate(-center.x, -center.y, -center.z);
        geometry.computeBoundingSphere();
        const radius = geometry.boundingSphere.radius || 1;

        const material = new THREE.MeshPhongMaterial({
            color: 0xd8d8d8,
            specular: 0x222222,
            shininess: 25,
            side: THREE.DoubleSide
        });

        currentMesh = new THREE.Mesh(geometry, material);
        scene.add(currentMesh);

        camera.near = radius / 100;
        camera.far = radius * 100;
        camera.position.set(radius * 1.8, radius * 1.4, radius * 1.8);
        camera.updateProjectionMatrix();
        controls.target.set(0, 0, 0);
        controls.update();

        document.getElementById('viewer-hint').style.display = 'none';
        document.getElementById('model-name').textContent = label || '';
        document.getElementById('clear-btn').style.display = 'inline-block';
    }

    function clearViewer() {
        if (currentMesh) {
            scene.remove(currentMesh);
            currentMesh.geometry.dispose();
            currentMesh.material.dispose();
            currentMesh = null;
        }
        document.getElementById('viewer-hint').style.display = 'flex';
        document.getElementById('model-name').textContent = '';
        document.getElementById('clear-btn').style.display = 'none';
        document.getElementById('stlInput').value = '';
    }

    function loadSTLFromURL(url, label) {
        const loader = new THREE.STLLoader();
        loader.load(
            url,
            geometry => showModel(geometry, label),
            undefined,
            () => {
                document.getElementById('viewer-hint').style.display = 'flex';
                document.getElementById('viewer-hint').textContent =
                    "Couldn't load " + label + ". If you're testing this on your computer by double-clicking index.html, that's the issue — browsers block local file loading that way. Run a local server instead (e.g. \"python3 -m http.server\" in the folder, then open localhost in your browser), or push it to GitHub Pages where it'll work normally.";
                document.getElementById('model-name').textContent = '';
            }
        );
    }

    function loadSTLFromFile(file) {
        const reader = new FileReader();
        reader.onload = e => {
            const loader = new THREE.STLLoader();
            const geometry = loader.parse(e.target.result);
            showModel(geometry, file.name);
        };
        reader.readAsArrayBuffer(file);
    }

    function buildStlList() {
        const list = document.getElementById('stl-list');
        const note = document.getElementById('stl-empty-note');
        if (STL_FILES.length === 0) {
            note.style.display = 'block';
            return;
        }
        STL_FILES.forEach(item => {
            const row = document.createElement('div');
            row.className = 'stl-item';

            const btn = document.createElement('button');
            btn.textContent = item.name;
            btn.onclick = () => loadSTLFromURL(item.file, item.name);
            row.appendChild(btn);

            if (item.makerworld) {
                const link = document.createElement('a');
                link.className = 'makerworld-sub';
                link.href = item.makerworld;
                link.target = '_blank';
                link.rel = 'noopener';
                link.textContent = 'View on MakerWorld ↗';
                row.appendChild(link);
            }

            list.appendChild(row);
        });
    }

    document.getElementById('stlInput').addEventListener('change', e => {
        if (e.target.files && e.target.files[0]) {
            loadSTLFromFile(e.target.files[0]);
        }
    });

    /* =========================================================
       Init
       ========================================================= */

    buildGallery();
    buildStlList();
    initViewer();
    </script>

</body>
</html>
